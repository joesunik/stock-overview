server:
  port: 8080

spring:
  application:
    name: stock-overview-backend
  datasource:
    url: jdbc:mysql://localhost:3306/stock_overview?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

# Kiwoom API (set via env: KIWOOM_APP_KEY, KIWOOM_SECRET_KEY, KIWOOM_BASE_URL)
kiwoom:
  base-url: ${KIWOOM_BASE_URL:https://api.kiwoom.com}
  app-key: ${KIWOOM_APP_KEY:}
  secret-key: ${KIWOOM_SECRET_KEY:}
